# Server Port
server.port=7080

# Database Connection Settings
spring.datasource.url=jdbc:mysql://localhost:3306/storage_gestion?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=stock_user
spring.datasource.password=MySecurePassword2026!
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configuration
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect




# Disable Hibernate DDL generation so it doesn't fight Flyway
spring.jpa.hibernate.ddl-auto=validate

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true